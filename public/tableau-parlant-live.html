<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau parlant — Live</title>
  <link rel="stylesheet" href="/css/narrative-viewer.css?v=tp2" />
  <style>
    .live-layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    .live-sidebar { background: #141414; padding: 12px; overflow-y: auto; border-right: 1px solid #333; }
    .live-main { display: flex; flex-direction: column; overflow: hidden; }
    .live-canvas-wrap { padding: 12px 16px 0; text-align: center; }
    #live-canvas { max-width: 100%; max-height: 220px; border: 1px solid #333; background: #000; }
    .agent-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px 16px; max-width: 560px; }
    .agent-cell {
      aspect-ratio: 1; background: #222; border: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; border-radius: 4px;
    }
    .agent-cell:hover { background: #3a3a5a; }
    .agent-cell.has-voice { border-color: #6a8aba; }
    #live-log { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 12px; line-height: 1.5; }
    .utterance-line { margin-bottom: 8px; padding: 6px; border-left: 3px solid #444; }
    .utterance-line.source-W { border-color: #5a8a5a; }
    .utterance-line.source-O { border-color: #5a6a9a; }
    .utterance-line.source-N { border-color: #9a6a5a; }
    h1 { font-size: 16px; margin: 0 0 12px; font-weight: 600; }
    .status { font-size: 11px; color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="live-layout">
    <aside class="live-sidebar">
      <h1>Tableau parlant live</h1>
      <p class="status" id="live-status">Connexion…</p>
      <div id="speech-panel"></div>
    </aside>
    <main class="live-main">
      <div class="live-canvas-wrap">
        <img id="live-canvas" alt="Canvas collaboratif" />
      </div>
      <p style="padding:8px 16px 0;font-size:13px;color:#aaa;">
        Survolez une cellule pour entendre le dernier énoncé W de cet agent.
      </p>
      <div class="agent-grid" id="agent-grid"></div>
      <div id="live-log"></div>
    </main>
  </div>
  <script src="/js/tableau-parlant-live.js?v=tp4"></script>
</body>
</html>
